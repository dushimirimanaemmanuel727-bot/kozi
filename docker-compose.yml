version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kazi-home-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kazi_home
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - kazi-home-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kazi-home-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kazi_home
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-nextauth-secret-here
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./public/uploads:/app/public/uploads
    networks:
      - kazi-home-network

volumes:
  postgres_data:
    driver: local

networks:
  kazi-home-network:
    driver: bridge
