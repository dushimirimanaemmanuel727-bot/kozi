version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:temp_password_123@db:5432/kazi_home
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-temp_secret_for_testing}
      - DATABASE_SSL=false
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - kazi-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || curl -f http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-kazi_home}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=temp_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create-superadmin.sql:/docker-entrypoint-initdb.d/create-superadmin.sql
      - ./database-schema.sql:/docker-entrypoint-initdb.d/database-schema.sql
    ports:
      - "${DB_PORT:-5433}:5432"
    restart: unless-stopped
    networks:
      - kazi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kazi_home}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for session storage (optional but recommended)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - kazi-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  kazi-network:
    driver: bridge
