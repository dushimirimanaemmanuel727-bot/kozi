version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/kazi_home
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-nextauth-secret-here
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - kazi-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=kazi_home
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create-superadmin.sql:/docker-entrypoint-initdb.d/create-superadmin.sql
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - kazi-network

  # Redis for session storage (optional but recommended)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - kazi-network
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  kazi-network:
    driver: bridge
