apiVersion: apps/v1
kind: Deployment
metadata:
  name: kazi-home-app
  namespace: kazi-home
  labels:
    app: kazi-home
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kazi-home
  template:
    metadata:
      labels:
        app: kazi-home
        version: v1
    spec:
      containers:
      - name: kazi-home
        image: ghcr.io/dushimirimanaemmanuel727-bot/kozi:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kazi-home-secrets
              key: database-url
        - name: NEXTAUTH_URL
          value: "https://kazihome.com"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: kazi-home-secrets
              key: nextauth-secret
        - name: DATABASE_SSL
          value: "false"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kazi-home-service
  namespace: kazi-home
  labels:
    app: kazi-home
spec:
  selector:
    app: kazi-home
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kazi-home-ingress
  namespace: kazi-home
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
  - hosts:
    - kazihome.com
    secretName: kazi-home-tls
  rules:
  - host: kazihome.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kazi-home-service
            port:
              number: 80
